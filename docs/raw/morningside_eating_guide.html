ttps://www.columbiaspectator.com/arts-and-entertainment/2020/12/03/vietnamese-pop-up-restaurant-banh-vietnamese-shop-house-is-a-hit-prepares-to-open-full-time/\">Bánh Vietnamese Shop House</a> has earned its place as a go-to first date location and parent’s weekend spot for Columbia students. The eatery offers rare Vietnamese dishes, including Bánh Chưng Chiên, a crispy sticky rice dish usually served only during the Vietnamese Lunar New Year.","type":"text"},{"content":"The eatery serves staples in Vietnamese cooking, including a selection of bánh mì and pho, of which the barbecue pork bánh mì stands out for its juicy pork and scallion oil. Some of the entrées such as bun cha—a barbecue platter including charred pork skewers, a crispy pork and vegetable roll, and rice noodles—earn their merits from their deep savory flavors and juicy texture.","type":"text"},{"content":"<b>Fumo, 2791 Broadway</b>","type":"header"},{"caption":"From 11 a.m. to 4 p.m. on weekdays, students can feast on any Fumo pasta dish for $12. ","credits":{"by":[{"name":"Kathy Fang","slug":""}]},"subtitle":"Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/OHDFNQHIYJDATMIG6FN4NT6XFI.jpg"},{"content":"Students flock to resident Italian favorite Fumo for its $12 pasta lunch special, $7 Happy Hour wine, and wood-fired pizzas topped with creamy vodka sauce, wild mushrooms, and more. According to the eatery, it serves fresh, homemade food, allowing for its motto—“eat real food”—to remain true to character.","type":"text"},{"content":"As many Columbia students hunt for high-quality, low-priced meals, Fumo’s long list of pasta dishes often tempts students during a weekday afternoon lull. From 11 a.m. to 4 p.m. on weekdays, students enjoy options such as penne vodka accompanied by prosciutto and shallots or rigatoni salsiccia, a dish topped with marinara, crumbled sausage, tomatoes, and spinach.","type":"text"},{"content":"<b>Community Food &amp; Juice, 2893 Broadway</b>","type":"header"},{"caption":"One of the most popular brunch spots around Columbia, Community Food & Juice offers American breakfast classics such as sweet, fluffy pancakes and biscuit sandwiches.","credits":{"by":[{"name":"Millie Felder"}]},"subtitle":"Senior Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/UNPSVJ3JBBAKDADZYRZAFEQ37A.JPG"},{"content":"Formerly co-owned by the same owners of Clinton Street Baking Company &amp; Restaurant, a coveted brunch spot on the Lower East Side, Community Food &amp; Juice offers a similarly healthy menu with shorter wait times. Dishes often include seasonal, local, and organic ingredients such as local heirloom beets and wild organic salmon.","type":"text"},{"content":"A Columbia student typically frequents Community Food &amp; Juice for its brunch and dinner menus that feature healthy twists on American breakfast, lunch, and dinner favorites. These include pancakes topped with bananas and walnuts, hashbrowns made of shredded potatoes and carrots, a pan-seared fish sandwich, and a grilled salmon burger. Standout menu items include pancakes accompanied by a rich maple butter and a sandwich served on a buttermilk biscuit.","type":"text"},{"content":"<b>Sushi W, 2673 Broadway</b>","type":"header"},{"caption":"Sushi W values high quality service and ingredients.","credits":{"by":[{"name":"Kathy Fang","slug":""}]},"subtitle":"Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/AIWQHD4ROBAGNECBDXGH44D4QI.jpg"},{"content":"Sushi W operates under the premise that high-quality omakase should be affordable for all. Compared to other coveted omakase-style sushi restaurants around New York City that serve a set menu between $100 and $400, Sushi W’s basic omakase provides 12 nigiri pieces and a handroll for only $48.","type":"text"},{"content":"During the one-hour meal, guests sit across from the restaurant’s sushi chef, known as the itamae. After they craft each piece with warm sushi rice and fish sourced locally and globally, the chef sets it directly on the guest’s plate. It is recommended to eat each piece as it arrives on the plate for optimal temperature and freshness. Pieces notable for their rich flavor include a sea-salt-seasoned chutoro, blow-torch-seared sablefish, and sansho-pepper-topped unagi. While the sea salt brings out the savory undertones of the chutoro, the seared exterior of the sablefish provides a delightfully smoky aftertaste. The sansho pepper pleasantly numbs the tongue as diners relish the crispy yet fatty unagi.","type":"text"},{"content":"<b>115th Street halal cart</b>","type":"header"},{"caption":"The 115th Street halal cart serves most students at night.","credits":{"by":[{"name":"Violet Mendelsund","slug":""}]},"subtitle":"Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/HU4K5JVZZJAQJMWTKQBDN6B5PY.JPG"},{"content":"A debate almost as heated as the debate over bagels, the question of which halal cart is best involves many factors, including proximity to campus, food quality, and service. The 115th Street halal cart shines in all three. Though Columbia students frequent the 115th Street halal cart for a lunchtime lamb gyro or afternoon chicken over rice, the cart that names itself “The Master of Culinary Art” greets its largest crowds after 10 p.m.","type":"text"},{"content":"Whether coming home from a late night at the library or a wild night downtown, students wait in rain or shine for their Mediterranean food made with care. Late night regulars are often greeted as “friend” as they pass by the truck on their way to Shapiro Hall or while ordering their go-to midnight snack. If you visit frequently, you might be lucky enough to receive a few free fries on top of your gyro.","type":"text"},{"content":"<b>Wu &amp; Nussbaum, 2897 Broadway</b>","type":"header"},{"caption":"Wu & Nussbaum serves fresh bagels daily.","credits":{"by":[{"name":"Kate Della Pietra"}]},"subtitle":"Senior Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/IUPCZOWKPNGZNNGABTU6NUD6DE.JPG"},{"content":"Though the Columbia bagel debate may never be settled, two sides remain clear: Wu &amp; Nussbaum and Absolute Bagels. While Absolute Bagels loyalists stand behind the cash-only eatery for its often-steaming chewy bagels, fans of Wu &amp; Nussbaum flock to the 113th Street eatery for its breakfast sandwiches packed with real eggs, fresh lox, and more. After 11:30 a.m., the restaurant serves Chinese dishes, such as xiao long bao and beef noodle soup.","type":"text"},{"content":"Wu &amp; Nussbaum presides as a premier bagel shop in Morningside Heights for its reasonable wait times, hearty bagel sandwiches, and wide assortment of bagels—its egg, everything bagel is remarkably sweet and savory at once. For those craving an order off the beaten path, the sausage egg and cheese provides the same savory flavor as a bacon egg and cheese with less fat.","type":"text"},{"content":"<b>Roti Roll, 994 Amsterdam Ave.</b>","type":"header"},{"caption":"Roti Roll serves frankies, a beloved Indian street food, among other finger foods. ","credits":{"by":[{"name":"Kathy Fang","slug":""}]},"subtitle":"Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/ZO3T3YBLKJFYNNIU75WE6WN7EY.jpg"},{"content":"Whether craving Roti Roll’s Bombay frankie as an affordable lunch or a late-night snack, this Indian street food––originating in Old Bombay in the 1930s according to the restaurant––is filling and chock-full of Indian spices. Variations of this Indian flatbread-based dish include a chicken makhani frankie overflowing with chicken simmered in tomato and onion and an aloo gobi muttar frankie featuring spiced potatoes, cauliflower, and green peas.","type":"text"},{"content":"Open well past midnight, Roti Roll contributes to Amsterdam Avenue’s lively nightlife scene as it attracts Columbia students craving something other than a larger-than-life slice from Koronet Pizza or a juicy chopped cheese from their favorite bodega. Typically, two frankies feed a hungry student and cost between $7 and $16, depending on their contents. For those who want a side to accompany their frankie, finger foods such as hot aloo fries and samosas for $5 or less will satisfy the craving.","type":"text"},{"content":"<b>The Heights Bar &amp; Grill, 2867 Broadway</b>","type":"header"},{"caption":"The Heights serves a frozen margarita that can be flavored with various fruits.","credits":{"by":[{"name":"Violet Mendelsund","slug":""}]},"subtitle":"Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/ZJ74PBHXINB3RPUNZOUHZ2FOB4.JPG"},{"content":"The Heights beckons students to enjoy inventive cocktails including a passionfruit martini and peanut butter cup old-fashioned on its open-air rooftop dining area. Compared to other more stereotypical campus bars, such as Mel’s Burger Bar, The Heights attracts crowds who prefer a light drink with an ambient atmosphere.","type":"text"},{"content":"In the realm of food, the eatery’s menu offers an array of American and Mexican classics and variations. Whether diners start with Mexican street corn soup or The Heights classic wings, they should indulge in a frozen margarita, which can be flavored with mango, passion fruit, raspberry, strawberry, or peach. These frozen drinks, which are generously poured and flavored, bring Columbia students through the doors and convince them to stay for hours.","type":"text"},{"content":"<b>Malaysia Grill, 224 W. 104th St.</b>","type":"header"},{"caption":"Malaysian and Thai specialties greet students at Malaysia Grill.","credits":{"by":[{"name":"Kathy Fang","slug":""}]},"subtitle":"Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/4K6MVMY4BNFQXA7PJE227ITJ3U.jpg"},{"content":"Though less well-known by the average Columbia student, Malaysia Grill serves a variety of Malaysian specialties such as sweet yet savory chicken satay or beef rendang, a beef dish slow-cooked with ground onions, coconut curry, and lemongrass. Malaysia Grill’s roti canai, a Southeast Asian flatbread dipped in a spicy curry chicken sauce, is a crowd favorite beloved for its reasonable price, flaky texture, and generous curry portion.","type":"text"},{"content":"Located near 104th Street and Broadway, Malaysia Grill is worth the longer walk from campus—the finish line includes bubur cha cha, a coconut-based Malaysian dessert that includes sweet potato and yam. The eatery also offers an array of Thai-style dishes, such as tom yum soup and pad thai.","type":"text"},{"content":"<b>Uncle Luoyang food truck</b>","type":"header"},{"caption":"Students can often rely on the Uncle Luoyang food truck for heart Chinese dishes between classes.","credits":{"by":[{"name":"Violet Mendelsund","slug":""}]},"subtitle":"Staff Photographer","type":"image","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/ZY2YEFG7XVHFHNHFBGSWEIZUMY.JPG"},{"content":"Though Uncle Luoyang food truck often sells out of items by the end of the day, its Chinese specialties, such as pan-fried pork dumplings and mapo tofu, draw lines down Broadway during lunch hour. One in a long row of food trucks that border the western side of Columbia’s campus, Uncle Luoyang is revered for its food quality and prices.","type":"text"},{"content":"Other food trucks near campus often come and go depending on the day of the week and influx of students, but one can often count on Uncle Luoyang’s yellow truck to await them as they walk down Broadway. If craving a shareable snack, the truck’s pan-fried pork dumplings cost $10 for 15 pieces and are delightfully crunchy and savory.","type":"text"},{"content":"<i>Arts &amp; Entertainment Editor Bella Druckman can be contacted at </i><a href=\"mailto:bella.druckman@columbiaspectator.com\"><i>bella.druckman@columbiaspectator.com</i></a><i>. Follow her on Twitter </i><a href=\"https://mobile.twitter.com/bella_druckman\"><i>@bella_druckman</i></a><i>.</i>","type":"text"},{"content":"<b>Want to keep up with breaking news? Subscribe to our </b><a href=\"https://columbiaspectator.us4.list-manage.com/subscribe?u=a3d2eeb1ae5560ca04f82f042&id=e51c51d62d\"><b>email newsletter </b></a><b>and like Spectator on </b><a href=\"https://www.facebook.com/columbiaspectator\"><b>Facebook</b></a><b>.</b>","type":"text"}],"created_date":"2022-08-26T16:01:51.223Z","credits":{"by":[{"name":"Bella Druckman","slug":"bella-druckman","type":"author"}]},"description":{"basic":"Food and Drink"},"display_date":"2022-08-26T19:22:16.261Z","headlines":{"basic":"A beginner’s guide to Morningside Heights eating"},"promo_items":{"basic":{"caption":"Open past midnight, Roti Roll welcomes students returning from a late night out and craving a moderately priced, flavorful meal.","credits":{"by":[{"name":"Kathy Fang","slug":""}]},"subtitle":"Staff Photographer","url":"https://cloudfront-us-east-1.images.arcpublishing.com/spectator/ZO3T3YBLKJFYNNIU75WE6WN7EY.jpg"}},"related_content":{"redirect":[]},"subheadlines":{"basic":""},"subtype":"","taxonomy":{"sites":[{"name":"Arts and Culture"},{"name":"Main"},{"name":"Section Lead"}]},"_id":"5NB7DF4MPRFRHOU7QEREFLPVAI"};Fusion.globalContentConfig={"source":"article-service","query":{"uri":"/arts-and-culture/2022/08/26/a-beginners-guide-to-morningside-heights-eating/","website_url":"/arts-and-culture/2022/08/26/a-beginners-guide-to-morningside-heights-eating/","arc-site":"spectator"}};Fusion.lastModified=1781888489335;Fusion.contentCache={};Fusion.layout=null;Fusion.metas={"title":{"value":"{{content.headlines.basic}}","html":true},"image":{"value":"{{content.promo_items.basic.url}}","html":true},"url":{"value":"{{content.canonical_url}}","html":true},"description"
